    <rect x="135" y="140" width="30" height="30" fill="#fce4d6"/>
    <!-- Arms -->
    <path d="M120 180 C80 220, 50 350, 70 400 L90 400 C70 350, 95 250, 130 210 Z" fill="#fce4d6"/>
    <path d="M180 180 C220 220, 250 350, 230 400 L210 400 C230 350, 205 250, 170 210 Z" fill="#fce4d6"/>
    <!-- Legs -->
    <path d="M135 400 L135 650 L115 650 C115 670, 150 670, 150 650 L150 400 Z" fill="#fce4d6"/>
    <path d="M150 400 L150 650 L185 650 C185 670, 150 670, 150 650 L150 400 Z" fill="#fce4d6"/>
    
    <!-- Face Lines (Simplest) -->
