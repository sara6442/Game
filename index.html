<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dress Up Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <div class="canvas">
      <img id="background" src="assets/backgrounds/bg1.png" alt="background">
      <img id="body" src="assets/body/body.png" alt="body">
      <img id="hair" alt="hair">
      <img id="top" alt="top">
      <img id="bottom" alt="bottom">
      <img id="dress" alt="dress">
      <img id="accessory" alt="accessory">
    </div>

    <div class="controls">
      <h3>Tops</h3>
      <div class="grid" id="tops-grid"></div>

      <h3>Skirts & Bottoms</h3>
      <div class="grid" id="bottoms-grid"></div>

      <h3>Dresses</h3>
      <div class="grid" id="dresses-grid"></div>

      <h3>Hair</h3>
      <div class="grid" id="hair-grid"></div>

      <h3>Accessories</h3>
      <div class="grid" id="accessories-grid"></div>

      <h3>Backgrounds</h3>
      <div class="grid" id="backgrounds-grid"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
